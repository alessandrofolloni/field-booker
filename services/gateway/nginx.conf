# ========================================
# Field Booker — Nginx API Gateway
# ========================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream auth_service {
    server auth:8001;
}

upstream fields_service {
    server fields:8002;
}

upstream submissions_service {
    server submissions:8003;
}

upstream ai_service {
    server ai:8004;
}

upstream frontend_app {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;

    # Increase body size for photo uploads
    client_max_body_size 10M;

    # ──────────────────────────────────────
    # API Routes
    # ──────────────────────────────────────

    # Auth Service
    location /api/auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fields Service
    location /api/fields/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://fields_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Submissions Service
    location /api/submissions/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://submissions_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI Assistant Service
    location /api/ai/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://ai_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────
    # Frontend — Vite Dev Server (with HMR)
    # ──────────────────────────────────────
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check
    location /health {
        return 200 '{"status": "gateway healthy"}';
        add_header Content-Type application/json;
    }
}
